name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  release:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity minimal

      - name: Publish
        run: |
          dotnet publish KittyClaw.Web/KittyClaw.Web.csproj \
            --configuration Release \
            --output ./dist \
            --no-build \
            -p:PublishSingleFile=false

      - name: Package (Linux/macOS tarball)
        run: |
          tar -czf BeaverBoard-linux.tar.gz -C dist .
          echo "$(cat CHANGELOG.md | head -20)" > changelog-preview.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: BeaverBoard-dist
          path: dist/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
